version: "3.9"

# ═══════════════════════════════════════════════════════════════════════
# ACAI v4 — Production Docker Compose
# All services for full Cognitive OS deployment
#
# Start:    docker-compose -f docker-compose.prod.yml up -d
# Stop:     docker-compose -f docker-compose.prod.yml down
# Logs:     docker-compose -f docker-compose.prod.yml logs -f acai-backend
#
# Services:
#   acai-backend  — FastAPI Python server (port 8000)
#   acai-frontend — React UI (port 3000)
#   ollama        — Local LLM inference (port 11434)
#   weaviate      — Vector DB (port 8080)
#   neo4j         — Knowledge Graph (port 7474/7687)
#   redis         — Session memory + cache (port 6379)
#   postgres      — Audit logs + RBAC (port 5432)
#   prometheus    — Metrics collection (port 9090)
#   grafana       — Dashboards (port 3001)
#   nginx         — API Gateway + SSL (port 80/443)
# ═══════════════════════════════════════════════════════════════════════

x-common-env: &common-env
  PYTHONUNBUFFERED: "1"
  TZ: "Asia/Bahrain"

networks:
  acai-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16

volumes:
  weaviate-data:
  neo4j-data:
  neo4j-logs:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:
  ollama-models:
  minio-data:

services:

  # ── ACAI Backend (FastAPI) ─────────────────────────────────────────────
  acai-backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: acai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      # LLM Configuration
      INFERENCE_BACKEND: "ollama"
      OLLAMA_BASE_URL: "http://ollama:11434"
      PRIMARY_MODEL: "qwen2.5:72b"
      SPECIALIST_MODEL: "hf.co/inceptionai/jais-family-30b-chat"
      ROUTER_MODEL: "qwen3:8b"
      EMBEDDING_MODEL: "intfloat/multilingual-e5-large"
      # Fallback to Anthropic if local fails
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      FALLBACK_TO_ANTHROPIC: "true"
      # Database
      WEAVIATE_HOST: "weaviate"
      WEAVIATE_PORT: "8080"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-acai_neo4j_2025}"
      REDIS_URL: "redis://redis:6379"
      DATABASE_URL: "postgresql+asyncpg://acai:${POSTGRES_PASSWORD:-acai_pg_2025}@postgres:5432/acai"
      # Auth
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-this-immediately}"
      API_KEYS: "${API_KEYS:-dev-key-12345}"
      DEV_MODE: "false"
      # CORS
      CORS_ORIGINS: "http://localhost:3000,https://acai.yourdomain.com"
    volumes:
      - ./backend:/app
      - ./models:/app/models
    depends_on:
      - ollama
      - weaviate
      - neo4j
      - redis
      - postgres
    networks:
      - acai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React) ───────────────────────────────────────────────────
  acai-frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: acai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: "http://localhost:8000"
      REACT_APP_WS_URL: "ws://localhost:8000"
    depends_on:
      - acai-backend
    networks:
      - acai-network

  # ── Ollama (Local LLM) ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: acai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_MAX_LOADED_MODELS: "2"
      OLLAMA_FLASH_ATTENTION: "1"
    # GPU support — uncomment for NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    networks:
      - acai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Ollama Model Puller (runs once on startup) ─────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: acai-ollama-pull
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for Ollama...';
        sleep 15;
        ollama pull qwen3:8b &&
        echo 'qwen3:8b ready' ||
        echo 'WARNING: qwen3:8b pull failed';
        echo 'Pull complete. For larger models run manually:';
        echo '  docker exec acai-ollama ollama pull qwen2.5:72b';
        echo '  docker exec acai-ollama ollama pull hf.co/inceptionai/jais-family-30b-chat';
      "
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    depends_on:
      - ollama
    networks:
      - acai-network

  # ── Weaviate (Vector DB) ───────────────────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:1.28.2
    container_name: acai-weaviate
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"     # We supply our own embeddings
      ENABLE_MODULES: "text2vec-transformers,reranker-transformers"
      CLUSTER_HOSTNAME: "node1"
      LIMIT_RESOURCES: "false"
    volumes:
      - weaviate-data:/var/lib/weaviate
    networks:
      - acai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Neo4j (Knowledge Graph) ────────────────────────────────────────────
  neo4j:
    image: neo4j:5.24-community
    container_name: acai-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-acai_neo4j_2025}"
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_initial__size: "1G"
      NEO4J_dbms_memory_heap_max__size: "3G"
      NEO4J_dbms_memory_pagecache_size: "1G"
      NEO4J_dbms_default__database: "arabic-cognitive-ai"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - acai-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 15s
      retries: 5

  # ── Redis (Memory + Cache) ─────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: acai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 900 1
      --save 300 10
    volumes:
      - redis-data:/data
    networks:
      - acai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL (Audit Logs + Auth) ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: acai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "acai"
      POSTGRES_USER: "acai"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-acai_pg_2025}"
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - acai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus (Metrics) ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: acai-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - prometheus-data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - acai-network

  # ── Grafana (Dashboards) ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: acai-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-acai_grafana_2025}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: "localhost"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel,grafana-worldmap-panel"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    networks:
      - acai-network

  # ── MinIO (Arabic Document Storage) ───────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: acai-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "acai"
      MINIO_ROOT_PASSWORD: "${MINIO_PASSWORD:-acai_minio_2025}"
    volumes:
      - minio-data:/data
    networks:
      - acai-network

  # ── Nginx (API Gateway + SSL) ──────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: acai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - acai-backend
      - acai-frontend
    networks:
      - acai-network

# ═══════════════════════════════════════════════════════════
# QUICK START COMMANDS:
#
# 1. Create .env file:
#    cp .env.example .env
#    nano .env   (set your API keys)
#
# 2. Start all services:
#    docker-compose -f docker-compose.prod.yml up -d
#
# 3. Wait ~2 minutes, then check:
#    docker-compose -f docker-compose.prod.yml ps
#
# 4. Pull Ollama models (takes time, one-time):
#    docker exec acai-ollama ollama pull qwen3:8b           # 5GB - fast router
#    docker exec acai-ollama ollama pull qwen2.5:7b         # 4GB - good for dev
#    # For production (when GPU available):
#    docker exec acai-ollama ollama pull qwen2.5:72b        # 46GB
#    docker exec acai-ollama ollama pull hf.co/inceptionai/jais-family-30b-chat
#
# 5. Access services:
#    Frontend:      http://localhost:3000
#    API:           http://localhost:8000/api/docs
#    Neo4j Browser: http://localhost:7474
#    Grafana:       http://localhost:3001  (admin / acai_grafana_2025)
#    Prometheus:    http://localhost:9090
# ═══════════════════════════════════════════════════════════
