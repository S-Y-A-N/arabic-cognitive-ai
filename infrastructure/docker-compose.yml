version: "3.9"

# ═══════════════════════════════════════════════════════════════
# Arabic Cognitive AI Engine — Production Infrastructure Stack
# ═══════════════════════════════════════════════════════════════
#
# Services:
#   - FastAPI backend (Arabic Cognitive AI Engine)
#   - Weaviate (vector database — hybrid search)
#   - Neo4j (knowledge graph)
#   - Redis (caching + session memory)
#   - PostgreSQL (audit logs, RBAC, user management)
#   - Prometheus (metrics collection)
#   - Grafana (observability dashboard)
#   - Nginx (API gateway + SSL termination)
#   - MinIO (document storage — S3-compatible)
#
# GCC Data Sovereignty: All services are self-hosted.
# No data leaves the deployment environment.
#
# Run: docker-compose up -d
# ═══════════════════════════════════════════════════════════════

networks:
  arabic-ai-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  weaviate_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:

services:

  # ─── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arabic-ai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WEAVIATE_HOST=weaviate
      - WEAVIATE_PORT=8080
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-arabic_ai_secure_2024}
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://arabic_ai:${POSTGRES_PASSWORD:-secure_pg_2024}@postgres:5432/arabic_ai
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change_this_in_production}
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app
      - ./models:/app/models  # For local model weights
    networks:
      - arabic-ai-network
    depends_on:
      - weaviate
      - neo4j
      - redis
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Weaviate (Vector Database) ──────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:1.24.1
    container_name: arabic-ai-weaviate
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50051:50051"  # gRPC
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"  # Set to false in production
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      ENABLE_MODULES: ""  # No modules — we use our own embeddings
      CLUSTER_HOSTNAME: "node1"
      # Enable vector index compression for Arabic text
      HNSW_FLAT_SEARCH_CUTOFF: 40000
      # Multilingual content support
      DEFAULT_VECTORIZER_MODULE: none
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - arabic-ai-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Neo4j (Knowledge Graph) ─────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: arabic-ai-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP (browser UI)
      - "7687:7687"   # Bolt (driver protocol)
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-arabic_ai_secure_2024}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
      # Enable full-text search (important for Arabic text)
      NEO4J_dbms_connector_bolt_enabled: "true"
      # Arabic character encoding
      NEO4J_dbms_default__database: "arabic-knowledge"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/plugins:/plugins
      - ./neo4j/import:/import
      - ./neo4j/conf:/conf
    networks:
      - arabic-ai-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-arabic_ai_secure_2024}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Redis (Memory + Cache) ───────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: arabic-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 1gb 
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-redis_secure_2024}
    volumes:
      - redis_data:/data
    networks:
      - arabic-ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL (Audit + RBAC + Users) ───────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: arabic-ai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: arabic_ai
      POSTGRES_USER: arabic_ai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_pg_2024}
      # Arabic text support
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - arabic-ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arabic_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (Document Storage) ────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-01T00-00-00Z
    container_name: arabic-ai-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - arabic-ai-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── Prometheus (Metrics) ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: arabic-ai-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - arabic-ai-network

  # ─── Grafana (Observability Dashboard) ───────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: arabic-ai-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_secure_2024}
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: true
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - arabic-ai-network
    depends_on:
      - prometheus

  # ─── Nginx (API Gateway + SSL) ───────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: arabic-ai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - arabic-ai-network
    depends_on:
      - backend
